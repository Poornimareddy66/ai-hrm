version: "3.9"
services:
  postgres:
    image: postgres:15-alpine
    container_name: hrm_postgres
    environment:
      POSTGRES_DB: hrm_db
      POSTGRES_USER: hrm_user
      POSTGRES_PASSWORD: hrm_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  mongodb:
    image: mongo:6-jammy
    container_name: hrm_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: hrm_user
      MONGO_INITDB_ROOT_PASSWORD: hrm_secret
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
  redis:
    image: redis:7-alpine
    container_name: hrm_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hrm_backend
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgresql://hrm_user:hrm_secret@postgres:5432/hrm_db
      MONGODB_URI: mongodb://hrm_user:hrm_secret@mongodb:27017/hrm_logs?authSource=admin
      REDIS_URL: redis://redis:6379
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - postgres
      - mongodb
      - redis
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hrm_frontend
    environment:
      REACT_APP_API_URL: http://localhost:5000/api/v1
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
volumes:
  postgres_data:
  mongo_data:
  redis_data:
